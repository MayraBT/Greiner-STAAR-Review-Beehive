    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    window.storage = {
      async get(key, shared = false) {
        try {
          const collection = shared ? 'shared' : 'private';
          const doc = await db.collection(collection).doc(key).get();
          return doc.exists ? { key, value: doc.data().value, shared } : null;
        } catch (e) { console.error('[STORAGE]', e); return null; }
      },
      async set(key, value, shared = false) {
        try {
          const collection = shared ? 'shared' : 'private';
          await db.collection(collection).doc(key).set({ value, updated: new Date().toISOString() });
          return { key, value, shared };
        } catch (e) { console.error('[STORAGE]', e); return null; }
      },
      async delete(key, shared = false) {
        try {
          const collection = shared ? 'shared' : 'private';
          await db.collection(collection).doc(key).delete();
          return { key, deleted: true, shared };
        } catch (e) { console.error('[STORAGE]', e); return null; }
      },
      async list(prefix = '', shared = false) {
        try {
          const collection = shared ? 'shared' : 'private';
          const snapshot = await db.collection(collection).get();
          const keys = [];
          snapshot.forEach(doc => { if (!prefix || doc.id.startsWith(prefix)) keys.push(doc.id); });
          return { keys, prefix, shared };
        } catch (e) { console.error('[STORAGE]', e); return { keys: [], prefix, shared }; }
      },
      // Efficient: single query for all ticket submissions (no individual gets)
      async loadTicketSubs() {
        try {
          const snapshot = await db.collection('shared')
            .orderBy(firebase.firestore.FieldPath.documentId())
            .startAt('ticket')
            .endBefore('tickeu')
            .get();
          const subs = {};
          snapshot.forEach(doc => {
            if (!doc.id.startsWith('ticket')) return;
            // Skip activation flags like active:ticket...
            try {
              const obj = JSON.parse(doc.data().value);
              if (obj?.id) subs[doc.id] = obj;
            } catch(e) {}
          });
          return subs;
        } catch(e) { console.error('[STORAGE loadTicketSubs]', e); return {}; }
      }
    };
  </script>

const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybE4ExTwJjZbPFaTJBJtxXV8ifuB4MnnCgpHBNUpkIqFr7zvki6HQM8m_07Ltc7Y15yA/exec";

const SheetsSync = {
  enabled: false,
  
  init() {
    this.enabled = GOOGLE_SCRIPT_URL && GOOGLE_SCRIPT_URL.startsWith("https://script.google.com");
    if (this.enabled) {
      console.log("✓ Google Sheets sync enabled");
    } else {
      console.log("⚠ Google Sheets sync disabled");
    }
  },
  
  async syncSubmission(payload) {
    if (!this.enabled) return;
    try {
      await fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          action: "submit_quest",
          ...payload,
          synced_at: new Date().toISOString()
        })
      });
      console.log(`[SHEETS] Synced submission for ${payload.name} - Quest ${payload.quest}`);
    } catch (error) {
      console.warn("[SHEETS] Sync failed:", error);
    }
  },
  
  async syncActivation(payload) {
    if (!this.enabled) return;
    try {
      await fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          action: "ticket_activation",
          ...payload,
          synced_at: new Date().toISOString()
        })
      });
      console.log(`[SHEETS] Synced activation - Quest ${payload.ticket_id}`);
    } catch (error) {
      console.warn("[SHEETS] Activation sync failed:", error);
    }
  },
  
  async syncNewStudent(payload) {
    if (!this.enabled) return;
    try {
      await fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          action: "new_student_registration",
          ...payload,
          synced_at: new Date().toISOString()
        })
      });
      console.log(`[SHEETS] Synced new student ${payload.id}`);
    } catch (error) {
      console.warn("[SHEETS] New student sync failed:", error);
    }
  }
};

if (typeof window !== 'undefined') {
  SheetsSync.init();
}

const BAND_COLOR = p => {
  if(p===null||p===undefined)return RB.muted;
  const n=parseFloat(p);
  if(n>=77)return RB.green; if(n>=52)return RB.teal; if(n>=34)return RB.orange; return RB.red;
};
const BAND_LABEL = p => {
  if(p===null||p===undefined)return"—";
  const n=parseFloat(p);
  if(n>=90)return"H MASTERS"; if(n>=77)return"L MASTERS";
  if(n>=65)return"H MEETS"; if(n>=52)return"L MEETS";
  if(n>=44)return"H APP"; if(n>=35)return"L APP";
  if(n>=27)return"H DNM"; return"L DNM";
};

// Helper: Get performance band from score (0-7 for 8 bands)
const getBand = (score) => {
  if(score < 27) return 0; // L DNM
  if(score < 35) return 1; // H DNM
  if(score < 44) return 2; // L APP
  if(score < 52) return 3; // H APP
  if(score < 65) return 4; // L MEETS
  if(score < 77) return 5; // H MEETS
  if(score < 90) return 6; // L MASTERS
  return 7; // H MASTERS
};

// Calculate individual XP for a single quest submission
const calcPts = (etPct, smc3, isBoss=false) => {
  if(etPct===null||etPct===undefined) return 0;
  const et=parseFloat(etPct), base=parseFloat(smc3||0);
  
  let xp = 0;
  
  // +1 XP: Beat baseline
  if(et > base) xp += 1;
  
  // +2 XP: Cross a performance band
  const etBand = getBand(et);
  const baseBand = getBand(base);
  if(etBand > baseBand) xp += 2;
  
  // Boss Fight bonuses (individual)
  if(isBoss) {
    if(et >= 77) xp += 20; // +20 for Boss ≥ 77%
    else if(et >= 52) xp += 10; // +10 for Boss ≥ 52%
  }
  
  return xp;
};

// Calculate class-level bonuses for a quest
const calcClassBonus = (classSubmissions) => {
  if(!classSubmissions || classSubmissions.length === 0) return 0;
  
  let bonus = 0;
  let leveledUp = 0;
  let totalScore = 0;
  
  classSubmissions.forEach(sub => {
    if(sub.score_pct === null || sub.score_pct === undefined) return;
    
    const et = parseFloat(sub.score_pct);
    const base = parseFloat(sub.smc3 || 0);
    const etBand = getBand(et);
    const baseBand = getBand(base);
    
    // Count students who crossed a band
    if(etBand > baseBand) leveledUp++;
    
    totalScore += et;
  });
  
  const pctLeveledUp = (leveledUp / classSubmissions.length) * 100;
  const avgScore = totalScore / classSubmissions.length;
  
  // +5 XP: 75%+ of class leveled up
  if(pctLeveledUp >= 75) bonus += 5;
  // +3 XP: 50%+ of class leveled up
  else if(pctLeveledUp >= 50) bonus += 3;
  
  // +5/LVL: Class average ≥ MEETS (52%)
  if(avgScore >= 52) bonus += 5;
  
  return bonus;
};

function Q1A({submitted,onAnswer,initialSel}){
  const [sel,setSel]=useState(()=>initialSel?new Set(initialSel):new Set());
  const toggle=id=>{if(submitted)return;const s=new Set(sel);s.has(id)?s.delete(id):s.add(id);setSel(s);onAnswer(s);};
  const correct=[...sel].every(id=>Q1A_CORRECT.has(id))&&sel.size===Q1A_CORRECT.size;

// Q2: Drag-drop — Proportional vs Non-Proportional (8.5H, 8.5F)
const Q1B_ITEMS=[
  {id:"a",text:"y = 4x",cat:"prop"},
  {id:"b",text:"y = 4x + 1",cat:"nonprop"},
  {id:"c",text:"Table: (0,0) (2,6) (4,12)",cat:"prop"},
  {id:"d",text:"Graph: y-intercept = 3",cat:"nonprop"},
  {id:"e",text:"y = −5x",cat:"prop"},
  {id:"f",text:"C = 15n + 10",cat:"nonprop"},
];
function Q1B({submitted,onAnswer,initialZones}){
  const def={bank:Q1B_ITEMS.map(i=>i.id),prop:[],nonprop:[]};
  const [zones,setZones]=useState(()=>initialZones||def);
  const drag=useRef(null);
  const move=(id,from,to)=>{if(submitted||from===to)return;setZones(z=>{
    const n={bank:[...z.bank],prop:[...z.prop],nonprop:[...z.nonprop]};
    n[from]=n[from].filter(x=>x!==id);n[to].push(id);return n;
  });};
  const allCorrect=Q1B_ITEMS.every(item=>zones[item.cat]?.includes(item.id));
  useEffect(()=>{onAnswer({zones,isCorrect:allCorrect});},[JSON.stringify(zones)]);
  const Chip=({id,zone})=>{
    const item=Q1B_ITEMS.find(i=>i.id===id);
    let bg=RB.white,bd=`2px solid ${RB.border}`,fc=RB.text;
    if(submitted&&zone!=="bank"){const ok=zone===item.cat;bg=ok?"#E8F5E9":"#FFEBEE";bd=`2px solid ${ok?RB.green:RB.red}`;fc=ok?RB.green:RB.red;}
    return(
      <div draggable={!submitted} onDragStart={()=>{drag.current={id,from:zone};}}
        style={{padding:"7px 11px",background:bg,border:bd,fontFamily:"monospace",fontSize:12,color:fc,
          cursor:submitted?"default":"grab",marginBottom:5,userSelect:"none",
          display:"flex",alignItems:"center",gap:6,boxShadow:submitted?"none":"1px 1px 0 rgba(0,0,0,0.08)"}}>

        {item.text}
      </div>
    );
  };
  const Zone=({id,label,color,light})=>(
    <div onDragOver={e=>e.preventDefault()} onDrop={()=>drag.current&&move(drag.current.id,drag.current.from,id)}
      style={{flex:1,minHeight:150,border:`2px solid ${color}`,borderTop:`6px solid ${color}`,background:light,padding:10}}>
      <div style={{fontWeight:"bold",color:color,fontFamily:"monospace",fontSize:11,marginBottom:8}}>{label}</div>
      {zones[id].map(x=><Chip key={x} id={x} zone={id}/>)}
      {zones[id].length===0&&<div style={{color:RB.muted,fontFamily:"monospace",fontSize:10,textAlign:"center",marginTop:24}}>↓ DROP HERE</div>}
    </div>
  );
  return(
    <div>
      <QHeader num="2" label="Drag & Drop — Proportional vs Non-Proportional" color={ZONE_COLORS[1].accent}/>
      <p style={{fontSize:13.5,color:RB.text,lineHeight:1.65,marginBottom:12}}>Sort each relationship into the correct category.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        <div onDragOver={e=>e.preventDefault()} onDrop={()=>drag.current&&move(drag.current.id,drag.current.from,"bank")}
          style={{minHeight:150,border:`2px dashed ${RB.border}`,background:RB.gray1,padding:10}}>
          <div style={{fontFamily:"monospace",fontSize:10,color:RB.muted,marginBottom:6}}>CARDS TO SORT</div>
          {zones.bank.map(x=><Chip key={x} id={x} zone="bank"/>)}
        </div>
        <Zone id="prop"    label="✓  PROPORTIONAL  (y = kx)"         color={RB.teal}   light="#E0F2F0"/>
        <Zone id="nonprop" label="✗  NON-PROPORTIONAL  (b ≠ 0)"      color={RB.red}    light="#FFEBEE"/>
      </div>
      {submitted&&<Verdict correct={allCorrect}/>}
      {submitted&&!allCorrect&&<Hint color={RB.teal}
        text="Proportional: passes through (0,0), y/x is constant, no added value. Non-proportional: has a starting value (b ≠ 0), y-intercept is not zero."/>}
    </div>
  );
}

// Q2: Click-to-graph y = 2x (8.4B)
const GC3=6,GR3=5,CWG3=52,CHG3=36,GOX3=50,GOY3=28;
const onLine3=(px,py)=>Math.abs(py-2*px)<0.5&&px>=0&&py>=0&&px<GC3&&py<=GR3*2;
function Q3B({submitted,onAnswer,initialPts}){
  const [pts,setPts]=useState(()=>initialPts||[]);
  const SW=GOX3+GC3*CWG3+20,SH=GOY3+GR3*CHG3+38;
  const toSvg=(gx,ay)=>({x:GOX3+gx*CWG3,y:SH-GOY3-(ay/2)*CHG3});
  const fromClick=(px,py)=>({gx:Math.round((px-GOX3)/CWG3),ay:Math.round((SH-GOY3-py)/CHG3)*2});
  const handleClick=e=>{
    if(submitted)return;
    const rect=e.currentTarget.getBoundingClientRect();
    const {gx,ay}=fromClick(e.clientX-rect.left,e.clientY-rect.top);
    if(gx<0||gx>=GC3||ay<0||ay>GR3*2)return;
    const exists=pts.find(p=>p.x===gx&&p.y===ay);
    let next;
    if(exists)next=pts.filter(p=>!(p.x===gx&&p.y===ay));
    else if(pts.length<2)next=[...pts,{x:gx,y:ay}];
    else next=[pts[1],{x:gx,y:ay}];
    setPts(next);
    const ok=next.length===2&&next[0].x!==next[1].x&&next.every(p=>onLine3(p.x,p.y));
    onAnswer({pts:next,isCorrect:ok});
  };
  const isCorrect=submitted&&pts.length===2&&pts[0].x!==pts[1].x&&pts.every(p=>onLine3(p.x,p.y));
  let autoLine=null;
  if(pts.length===2&&pts[0].x!==pts[1].x){
    const [a,b]=pts,slope=(b.y-a.y)/(b.x-a.x),yAt=x=>a.y+slope*(x-a.x);
    const L=toSvg(0,yAt(0)),R=toSvg(GC3-1,yAt(GC3-1));
    autoLine={x1:L.x,y1:L.y,x2:R.x,y2:R.y};
  }
  const correctLine=submitted?{...toSvg(0,0),...{x2:toSvg(GC3-1,(GC3-1)*2).x,y2:toSvg(GC3-1,(GC3-1)*2).y}}:null;
  const yLabels=[0,2,4,6,8,10];
  return(
    <div>
      <QHeader num="2" label="Click to Graph — Proportional Relationship" color={ZONE_COLORS[1].accent}/>
      <p style={{fontSize:13.5,color:RB.text,lineHeight:1.65,marginBottom:6}}>
        Graph the equation <strong style={{color:RB.blue}}>y = 2x</strong>. Plot <strong>2 points</strong> on the coordinate plane — the line will draw automatically.
        <span style={{fontFamily:"monospace",fontSize:11,color:RB.muted,marginLeft:6}}>(click a point again to remove it)</span>
      </p>
      <div style={{fontFamily:"monospace",fontSize:11,color:RB.teal,marginBottom:8,
        background:RB.gray1,border:`1px solid ${RB.teal}`,padding:"4px 10px",display:"inline-block"}}>
        Points: {pts.length}/2{pts.length===2&&"  →  ("+pts[0].x+", "+pts[0].y+") and ("+pts[1].x+", "+pts[1].y+")"}
      </div>
      <div style={{overflowX:"auto"}}>
        <svg width={SW} height={SH} onClick={handleClick}
          style={{cursor:submitted?"default":"crosshair",border:`2px solid ${RB.border}`,background:RB.white,display:"block"}}>
          {Array.from({length:GC3+1},(_,i)=>(
            <line key={"v"+i} x1={GOX3+i*CWG3} y1={4} x2={GOX3+i*CWG3} y2={SH-GOY3+6}
              stroke={i===0?"#BBBBBB":"#EEEEEE"} strokeWidth={i===0?1.5:0.7}/>
          ))}
          {Array.from({length:GR3+1},(_,i)=>(
            <line key={"h"+i} x1={GOX3-6} y1={SH-GOY3-i*CHG3} x2={SW-12} y2={SH-GOY3-i*CHG3}
              stroke={i===0?"#BBBBBB":"#EEEEEE"} strokeWidth={i===0?1.5:0.7}/>
          ))}
          <polygon points={`${GOX3},4 ${GOX3-4},13 ${GOX3+4},13`} fill={RB.muted}/>
          <polygon points={`${SW-12},${SH-GOY3} ${SW-20},${SH-GOY3-4} ${SW-20},${SH-GOY3+4}`} fill={RB.muted}/>
          {Array.from({length:GC3},(_,i)=>(
            <text key={"xl"+i} x={GOX3+i*CWG3} y={SH-GOY3+18} textAnchor="middle" fontSize={11} fill={RB.muted}>{i}</text>
          ))}
          {yLabels.map((v,i)=>(
            <text key={"yl"+i} x={GOX3-10} y={SH-GOY3-i*CHG3+4} textAnchor="end" fontSize={11} fill={RB.muted}>{v}</text>
          ))}
          <text x={GOX3+GC3*CWG3/2} y={SH-4} textAnchor="middle" fontSize={11} fill={RB.muted} fontStyle="italic">x</text>
          <text x={14} y={GOY3+GR3*CHG3/2} textAnchor="middle" fontSize={11} fill={RB.muted} fontStyle="italic" transform={`rotate(-90,14,${GOY3+GR3*CHG3/2})`}>y</text>
          {autoLine&&!submitted&&(
            <line x1={autoLine.x1} y1={autoLine.y1} x2={autoLine.x2} y2={autoLine.y2}
              stroke={RB.blue} strokeWidth={2.2} opacity={0.6}/>
          )}
          {correctLine&&(
            <line x1={GOX3} y1={SH-GOY3} x2={toSvg(5,10).x} y2={toSvg(5,10).y}
              stroke={RB.green} strokeWidth={2.5} strokeDasharray={isCorrect?"none":"7,4"} opacity={0.85}/>
          )}
          {pts.map((p,i)=>{
            const s=toSvg(p.x,p.y);const ptOk=submitted&&onLine3(p.x,p.y);
            return(
              <g key={i}>
                <circle cx={s.x} cy={s.y} r={7} fill={submitted?(ptOk?RB.green:RB.red):RB.blue}
                  stroke={RB.white} strokeWidth={2}/>
                <text x={s.x+10} y={s.y-7} fontSize={11} fill={RB.text} fontFamily="monospace">({p.x},{p.y})</text>
              </g>
            );
          })}
        </svg>
      </div>
      {submitted&&<Verdict correct={isCorrect}/>}
      {submitted&&!isCorrect&&<Hint color={RB.orange}
        text="y = 2x is PROPORTIONAL — it passes through (0,0). Valid points: (0,0) (1,2) (2,4) (3,6) (4,8) (5,10). The line goes through the origin!"/>}
    </div>
  );
}

// ─── Q5B: DRAG & DROP — Proportional vs Non-Proportional (8.5H/F) ─────────────
const Q5B_ITEMS=[
  {id:"a",text:"y = 8x",cat:"prop"},
  {id:"b",text:"y = 3x − 5",cat:"nonprop"},
  {id:"c",text:"Table: (0,0) (1,4) (2,8)",cat:"prop"},
  {id:"d",text:"y = ½x + 2",cat:"nonprop"},
  {id:"e",text:"C = 0.75n",cat:"prop"},
  {id:"f",text:"y-int = −3, slope = 2",cat:"nonprop"},
];
function Q5B({submitted,onAnswer,initialZones}){
  const def={bank:Q5B_ITEMS.map(i=>i.id),prop:[],nonprop:[]};
  const [zones,setZones]=useState(()=>initialZones||def);
  const drag=useRef(null);
  const move=(id,from,to)=>{if(submitted||from===to)return;setZones(z=>{
    const n={bank:[...z.bank],prop:[...z.prop],nonprop:[...z.nonprop]};
    n[from]=n[from].filter(x=>x!==id);n[to].push(id);return n;
  });};
  const allCorrect=Q5B_ITEMS.every(item=>zones[item.cat]?.includes(item.id));
  useEffect(()=>{onAnswer({zones,isCorrect:allCorrect});},[JSON.stringify(zones)]);
  const Chip=({id,zone})=>{
    const item=Q5B_ITEMS.find(i=>i.id===id);
    let bg=RB.white,bd=`2px solid ${RB.border}`,fc=RB.text;
    if(submitted&&zone!=="bank"){const ok=zone===item.cat;bg=ok?"#E8F5E9":"#FFEBEE";bd=`2px solid ${ok?RB.green:RB.red}`;fc=ok?RB.green:RB.red;}
    return(
      <div draggable={!submitted} onDragStart={()=>{drag.current={id,from:zone};}}
        style={{padding:"7px 11px",background:bg,border:bd,fontFamily:"monospace",fontSize:12,color:fc,
          cursor:submitted?"default":"grab",marginBottom:5,userSelect:"none"}}>
        {!submitted&&<span style={{color:RB.muted,fontSize:9}}>⠿ </span>}
        {submitted&&zone!=="bank"&&<span style={{fontWeight:"bold",fontSize:11}}>{zone===item.cat?"✓ ":"✗ "}</span>}
        {item.text}
      </div>
    );
  };
  const Zone=({id,label,color,light})=>(
    <div onDragOver={e=>e.preventDefault()} onDrop={()=>drag.current&&move(drag.current.id,drag.current.from,id)}
      style={{flex:1,minHeight:140,border:`2px solid ${color}`,borderTop:`5px solid ${color}`,background:light,padding:10}}>
      <div style={{fontWeight:"bold",color:color,fontFamily:"monospace",fontSize:11,marginBottom:8}}>{label}</div>
      {zones[id].map(x=><Chip key={x} id={x} zone={id}/>)}
      {zones[id].length===0&&<div style={{color:RB.muted,fontFamily:"monospace",fontSize:10,textAlign:"center",marginTop:20}}>↓ DROP HERE</div>}
    </div>
  );
  return(
    <div>
      <QHeader num="2" label="Drag & Drop — Proportional vs Non-Proportional" color={ZONE_COLORS[1].accent}/>
      <p style={{fontSize:13.5,color:RB.text,lineHeight:1.65,marginBottom:12}}>Sort each relationship.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
        <div onDragOver={e=>e.preventDefault()} onDrop={()=>drag.current&&move(drag.current.id,drag.current.from,"bank")}
          style={{minHeight:140,border:`2px dashed ${RB.border}`,background:RB.gray1,padding:10}}>
          <div style={{fontFamily:"monospace",fontSize:10,color:RB.muted,marginBottom:6}}>ITEMS</div>
          {zones.bank.map(x=><Chip key={x} id={x} zone="bank"/>)}
        </div>
        <Zone id="prop" label="PROPORTIONAL (y=kx)" color={RB.green} light="#E8F5E9"/>
        <Zone id="nonprop" label="NON-PROPORTIONAL (b≠0)" color={RB.red} light="#FFEBEE"/>
      </div>
      {submitted&&<Verdict correct={allCorrect}/>}
      {submitted&&!allCorrect&&<Hint color={RB.green}
        text="Proportional: y=kx form, passes (0,0). Non-proportional: has +b or −b, y-intercept ≠ 0."/>}
    </div>
  );
}

// ─── Q5C: GRAPH PLOTTING — Plot proportional relationship (8.4B) ──────────────
function Q5C({submitted,onAnswer,initialPts}){
  const [pts,setPts]=useState(initialPts||[]);
  const gridSize=10;const scale=30;
  const isCorrect=pts.length>=2&&pts.every(([x,y])=>y===2*x);
  useEffect(()=>{onAnswer({pts,isCorrect});},[JSON.stringify(pts)]);
  const addPt=(x,y)=>{if(submitted||pts.length>=2)return;if(pts.some(([px,py])=>px===x&&py===y))return;setPts([...pts,[x,y]]);};
  const removePt=i=>{if(submitted)return;setPts(pts.filter((_,idx)=>idx!==i));};
  return(
    <div>
      <QHeader num="3" label="Graph Plotting — y = 2x" color={ZONE_COLORS[1].accent}/>
      <p style={{fontSize:13.5,color:RB.text,lineHeight:1.65,marginBottom:12}}>
        Plot <strong>2 points</strong> for <strong>y = 2x</strong>. Click grid to plot, click point to remove.
      </p>
      <div style={{display:"flex",gap:16,marginBottom:12}}>
        <svg width={scale*(gridSize*2+1)} height={scale*(gridSize*2+1)} style={{border:`2px solid ${RB.border}`,background:RB.white}}>
          {/* Grid lines */}
          {[...Array(gridSize*2+1)].map((_,i)=>{
            const pos=scale*i;
            return(<g key={i}>
              <line x1={pos} y1={0} x2={pos} y2={scale*(gridSize*2+1)} stroke={RB.gray3} strokeWidth={1}/>
              <line x1={0} y1={pos} x2={scale*(gridSize*2+1)} y2={pos} stroke={RB.gray3} strokeWidth={1}/>
            </g>);
          })}
          {/* Axes */}
          <line x1={scale*gridSize} y1={0} x2={scale*gridSize} y2={scale*(gridSize*2+1)} stroke={RB.dark} strokeWidth={2}/>
          <line x1={0} y1={scale*gridSize} x2={scale*(gridSize*2+1)} y2={scale*gridSize} stroke={RB.dark} strokeWidth={2}/>
          {/* Tick marks and labels */}
          {[...Array(gridSize*2+1)].map((_,i)=>{
            const val=i-gridSize;
            if(val===0)return null;
            const pos=scale*i;
            return(<g key={`tick-${i}`}>
              {/* X-axis tick */}
              <line x1={pos} y1={scale*gridSize-5} x2={pos} y2={scale*gridSize+5} stroke={RB.dark} strokeWidth={2}/>
              <text x={pos} y={scale*gridSize+20} textAnchor="middle" fontSize={10} fontFamily="monospace" fill={RB.muted}>{val}</text>
              {/* Y-axis tick */}
              <line x1={scale*gridSize-5} y1={pos} x2={scale*gridSize+5} y2={pos} stroke={RB.dark} strokeWidth={2}/>
              <text x={scale*gridSize-15} y={pos+4} textAnchor="end" fontSize={10} fontFamily="monospace" fill={RB.muted}>{gridSize-i}</text>
            </g>);
          })}
          {/* Line through points (when 2+ points plotted) - extends across entire graph */}
          {pts.length>=2&&(() => {
            // Calculate line through the TWO ACTUAL points plotted
            const [px1, py1] = pts[0];
            const [px2, py2] = pts[1];
            
            // Calculate slope from plotted points
            const slope = (py2 - py1) / (px2 - px1);
            
            // Extend line from x=-10 to x=10 using point-slope form
            const leftX = -10;
            const leftY = py1 + slope * (leftX - px1);
            const rightX = 10;
            const rightY = py1 + slope * (rightX - px1);
            
            // Convert to canvas coordinates
            const cx1 = scale*(leftX+gridSize);
            const cy1 = scale*(gridSize-leftY);
            const cx2 = scale*(rightX+gridSize);
            const cy2 = scale*(gridSize-rightY);
            
            const allCorrect = pts.length>=2 && pts.every(([x,y])=>y===2*x);
            const lineColor = submitted ? (allCorrect ? RB.green : RB.red) : ZONE_COLORS[1].accent;
            return <line x1={cx1} y1={cy1} x2={cx2} y2={cy2} stroke={lineColor} strokeWidth={2}/>;
          })()}
          {/* Clickable grid */}
          {!submitted&&[...Array(gridSize*2+1)].map((_,xi)=>[...Array(gridSize*2+1)].map((_,yi)=>{
            const x=xi-gridSize,y=gridSize-yi;
            return <circle key={`${xi}-${yi}`} cx={scale*xi} cy={scale*yi} r={12}
              fill="transparent" cursor="pointer" onClick={()=>addPt(x,y)}/>;
          }))}
          {/* Plotted points */}
          {pts.map(([x,y],i)=>{
            const cx=scale*(x+gridSize),cy=scale*(gridSize-y);
            const ok=submitted?y===2*x:true;
            return(<circle key={i} cx={cx} cy={cy} r={6} fill={submitted?(ok?RB.green:RB.red):ZONE_COLORS[1].accent}
              stroke={RB.dark} strokeWidth={2} cursor={submitted?"default":"pointer"}
              onClick={()=>removePt(i)}/>);
          })}
        </svg>
        <div style={{flex:1}}>
          <div style={{fontFamily:"monospace",fontSize:11,fontWeight:"bold",color:RB.dark,marginBottom:6}}>POINTS ({pts.length}/2 required)</div>
          {pts.length===0&&<div style={{color:RB.muted,fontSize:11}}>Click grid to plot.</div>}
          {pts.map(([x,y],i)=>{
            const ok=submitted?y===2*x:true;
            return(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                padding:"5px 10px",background:submitted?(ok?"#E8F5E9":"#FFEBEE"):RB.gray1,
                border:`1px solid ${submitted?(ok?RB.green:RB.red):RB.border}`,marginBottom:4,fontFamily:"monospace",fontSize:12}}>
                <span style={{color:submitted?(ok?RB.green:RB.red):RB.text}}>
                  {submitted&&(ok?"✓ ":"✗ ")}({x}, {y})
                </span>
                {!submitted&&<button onClick={()=>removePt(i)} style={{background:"none",border:"none",
                  color:RB.red,cursor:"pointer",fontSize:14}}>✕</button>}
              </div>
            );
          })}
        </div>
      </div>
      {submitted&&<Verdict correct={isCorrect}/>}
      {submitted&&!isCorrect&&<Hint color={ZONE_COLORS[1].accent}
        text="For y=2x: when x=1, y=2; when x=2, y=4; when x=3, y=6. Must pass through (0,0). Both points must satisfy y=2x."/>}
    </div>
  );
}

  return(
    <div>
      <div style={{fontSize:14,fontWeight:600,color:RB.dark,marginBottom:14}}>

      </div>

// ─── SCORE SCREEN ─────────────────────────────────────────────────────────────
function ScoreScreen({score,total,ticketId,onRetry,studentId}){
  const pct=Math.round(score/total*100);
  const col=pct===100?RB.yellow:pct>=67?RB.green:pct>=34?RB.orange:RB.red;
  const quest=TICKETS.find(q=>q.id===ticketId);
  const isPreview=["0000001","0000002","0000003","0000004"].includes(studentId);
  const [emoji,hl,sub]=pct===100
    ?["🏆","QUEST COMPLETE!","You earned full XP! Next quest unlocked soon."]
    :pct>=67
      ?["⭐","QUEST CLEARED!","Nice work, adventurer!"]
      :isPreview
        ?["🔄","KEEP GRINDING!","Review the hints and retry."]
        :["📝","KEEP LEARNING!","Review the hints and explanations below."];
  return(
    <div style={{textAlign:"center",padding:"24px 16px"}}>
      <div style={{display:"inline-block",background:col,color:RB.white,
        border:`3px solid ${RB.dark}`,boxShadow:`6px 6px 0 rgba(0,0,0,0.2)`,
        padding:"22px 52px",marginBottom:18}}>
        <div style={{fontFamily:"monospace",fontSize:9,letterSpacing:3,opacity:.85,marginBottom:4}}>XP EARNED</div>
        <div style={{fontFamily:"monospace",fontSize:52,fontWeight:"bold",lineHeight:1}}>{score}/{total}</div>
        <div style={{fontFamily:"monospace",fontSize:20,marginTop:6}}>{pct}%</div>
      </div>
      <div style={{fontFamily:"monospace",fontSize:15,fontWeight:"bold",color:col,letterSpacing:1,marginBottom:4}}>{emoji} {hl}</div>
      <div style={{fontFamily:"monospace",fontSize:11,color:RB.muted,marginBottom:20}}>{sub}</div>
      <div style={{maxWidth:360,margin:"0 auto 24px"}}>
        <div style={{display:"flex",justifyContent:"space-between",fontFamily:"monospace",fontSize:10,color:RB.muted,marginBottom:4}}>
          <span>Quest {ticketId} XP</span><span>{pct}/100</span>
        </div>
        <XPBar pct={pct} color={col}/>
      </div>
      {pct<100&&isPreview&&<PixelBtn onClick={onRetry} bg={RB.blue}>🔄 RETRY QUEST</PixelBtn>}
      {pct<100&&!isPreview&&<div style={{fontFamily:"monospace",fontSize:11,color:RB.muted,marginTop:10}}>Quest locked. Review your answers below.</div>}
    </div>
  );
}

// ─── STUDENT MODE ─────────────────────────────────────────────────────────────
function StudentMode(){
  const [studentId,setStudentId]=useState("");
  const [student,setStudent]=useState(null);
  const [idError,setIdError]=useState("");
  const [idLocked,setIdLocked]=useState(false);
  const [activeQuest,setActiveQuest]=useState(null);  // which quest is being taken
  const [activated,setActivated]=useState({});        // {1:bool,2:bool,...}
  const [ans,setAns]=useState({q1:null,q2:null,q3:null,q4:null,q5:null,q6:null,q7:null,q8:null,q9:null,q10:null});
  const [submitted,setSubmit]=useState(false);
  const [showScore,setShowScore]=useState(false);
  const [saveStatus,setSaveStatus]=useState("idle");
  const [prevScores,setPrevScores]=useState({});
  const [lastCheck,setLastCheck]=useState(new Date().toLocaleTimeString());
  const [refreshing,setRefreshing]=useState(false);
  const [timedOut,setTimedOut]=useState(false);
  const [showRegistration,setShowRegistration]=useState(false);
  const [regName,setRegName]=useState("");
  const [regTeacher,setRegTeacher]=useState("");
  const [regPeriod,setRegPeriod]=useState("");


  // Load activation flags + previous scores
  useEffect(()=>{
    if(!student?.t)return;
    console.log(`[STUDENT DEBUG] Loading flags for student. Teacher: "${student.t}"`);
    const loadFlags=async()=>{
      const flags={};
      const timeoutPromise = new Promise((_, reject) => 
        setTimeout(() => reject(new Error('timeout')), 10000) // Increased to 10 seconds
      );
      
      for(const ticket of TICKETS){
        let retries = 2; // Retry twice on failure
        let success = false;
        
        while(retries > 0 && !success) {
          try{
            const storageKey = `active:ticket${ticket.id}:${student.t}`;
            const r = await Promise.race([
              window.storage.get(storageKey,true),
              timeoutPromise
            ]);
            flags[ticket.id]=r?.value==="1";
            console.log(`[STUDENT DEBUG] Quest ${ticket.id}: key="${storageKey}", value="${r?.value}", isActive=${flags[ticket.id]}`);
            success = true;
          }
          catch(e){
            retries--;
            if(retries === 0) {
              // Only set to false after all retries exhausted
              flags[ticket.id]=false;
              if(e.message !== 'timeout') {
                console.error(`[STUDENT DEBUG ERROR] Quest ${ticket.id}:`, e);
              } else {
                console.warn(`[STUDENT DEBUG] Quest ${ticket.id} timed out after retries, defaulting to locked`);
              }
            } else {
              console.log(`[STUDENT DEBUG] Quest ${ticket.id} read failed, retrying...`);
              await new Promise(resolve => setTimeout(resolve, 1000)); // Wait 1 second before retry
            }
          }
        }
      }
      setActivated(flags);
      setLastCheck(new Date().toLocaleTimeString());
    };
    loadFlags();
    // Poll every 10 seconds for teacher updates (reduced to minimize storage load)
    const interval=setInterval(loadFlags,10000);
    return()=>clearInterval(interval);
  },[student?.t]);



  // Block copy/paste keyboard shortcuts during quest
  useEffect(()=>{
    if(!activeQuest)return;
    const blockKeys = (e) => {
      // Block Ctrl+C, Ctrl+A, Ctrl+X, Cmd+C, Cmd+A, Cmd+X, F12
      if((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'a' || e.key === 'x')){
        e.preventDefault();
        return false;
      }
      // Block F12 (developer console)
      if(e.key === 'F12'){
        e.preventDefault();
        return false;
      }
    };
    document.addEventListener('keydown', blockKeys);
    return () => document.removeEventListener('keydown', blockKeys);
  },[activeQuest]);

  // Load previous scores when student logs in
  const reloadScores = useCallback(async()=>{
    if(!studentId||studentId.length!==7)return;
    console.log("[RELOAD SCORES] Fetching scores for student",studentId);
    const scores={};
    for(const ticket of TICKETS){
      try{const r=await window.storage.get("ticket"+ticket.id+":"+studentId,true);if(r?.value)scores[ticket.id]=JSON.parse(r.value);}
      catch(e){}
    }
    console.log("[RELOAD SCORES] Loaded scores:",Object.keys(scores).length,"quests completed");
    setPrevScores(scores);
  },[studentId]);

  useEffect(()=>{
    reloadScores();
  },[reloadScores,idLocked]);

  const lookupId=val=>{
    const c=val.replace(/\D/g,"").slice(0,7);setStudentId(c);setIdError("");setStudent(null);setShowRegistration(false);
    if(c.length===7){
      const f=ROSTER[c];
      if(f)setStudent(f);
      else{setIdError("ID not found.");setShowRegistration(true);}
    }
  };

  const handleNewStudentRegistration=async()=>{
    if(studentId.length!==7){
      alert("Student ID must be exactly 7 digits");
      return;
    }
    if(!regName.trim()||!regTeacher||!regPeriod){
      alert("Please fill in all fields");
      return;
    }
    const newStudent={n:regName.trim(),t:regTeacher,p:regPeriod,b:0};
    setStudent(newStudent);
    setShowRegistration(false);
    setIdError("");
    await SheetsSync.syncNewStudent({
      id:studentId,
      name:newStudent.n,
      teacher:newStudent.t,
      period:newStudent.p,
      registered_at:new Date().toISOString()
    });
    console.log("[NEW STUDENT] Registered:",newStudent);
  };

  const startQuest=async(qId)=>{
    // Always check storage in real-time before starting (in case prevScores is stale)
    try{
      const r=await window.storage.get("ticket"+qId+":"+studentId,true);
      if(r?.value){
        const sub=JSON.parse(r.value);
        if(!["0000001","0000002","0000003","0000004"].includes(studentId)){
          console.log("[START QUEST] Quest",qId,"already completed in storage. Cannot start.");
          alert("You have already completed this quest. You cannot retake it.");
          // Force reload prevScores to sync
          await reloadScores();
          return;
        }
      }
    }catch(e){
      console.log("[START QUEST] No previous submission found for quest",qId);
    }
    setActiveQuest(qId);setAns({q1:null,q2:null,q3:null});setSubmit(false);setShowScore(false);setSaveStatus("idle");
  };

  const qDefs=activeQuest?TICKET_QUESTIONS[activeQuest]:null;
  const calcScore=()=>{
    if(!qDefs)return 0;
    return qDefs.reduce((s,{getScore})=>s+getScore(ans),0);
  };
  const calcTotalPossible=()=>{
    if(!qDefs)return 0;
    // For ticket 1, we know there are 3 questions each worth 1 point
    // For other tickets, we need to count questions
    return qDefs.length;
  };

  const handleSubmit=async()=>{
    setSubmit(true);setSaveStatus("saving");
    const sc=calcScore();
    const totalPossible=calcTotalPossible();
    const pct=Math.round(sc/totalPossible*100);
    const qDef=TICKET_QUESTIONS[activeQuest];
    const questionData=qDef.reduce((acc,{key,saveQ})=>({...acc,...saveQ(ans)}),{});
    const questSMC3 = getQuestSMC3(studentId, activeQuest) || parseFloat(student.b) || 0;
    const payload={id:studentId,name:student.n,teacher:student.t,period:student.p,smc3:questSMC3,
      score_raw:sc,score_pct:pct,...questionData,quest:activeQuest,timestamp:new Date().toISOString()};
    try{
      await window.storage.set("ticket"+activeQuest+":"+studentId,JSON.stringify(payload),true);
      await SheetsSync.syncSubmission(payload);
      setSaveStatus("saved");
      console.log("[SUBMIT] Quest saved. Will reload scores in 2 seconds...");
      // Reload scores after save with longer delay for storage propagation
      setTimeout(()=>reloadScores(),2000);
    }catch(e){console.error(e);setSaveStatus("error");}
    setTimeout(()=>setShowScore(true),400);
  };

  const reset=()=>{
    setActiveQuest(null);
    setAns({q1:null,q2:null,q3:null});
    setSubmit(false);
    setShowScore(false);
    setSaveStatus("idle");
    // Reload scores multiple times with increasing delays to handle storage propagation
    setTimeout(()=>reloadScores(),1000);
    setTimeout(()=>reloadScores(),3000);
    setTimeout(()=>reloadScores(),5000);
  };

  const zone=ZONE_COLORS[1];

  // ── Quest selector ──
  if(idLocked&&!activeQuest){
    const manualRefresh=async()=>{
      setRefreshing(true);
      const flags={};
      
      // Timeout wrapper for storage calls
      const timeoutPromise = new Promise((_, reject) => 
        setTimeout(() => reject(new Error('timeout')), 8000)
      );
      
      try {
        for(const ticket of TICKETS){
          try{
            const storageKey = `active:ticket${ticket.id}:${student.t}`;
            // Race storage call against 8 second timeout
            const r = await Promise.race([
              window.storage.get(storageKey,true),
              timeoutPromise
            ]);
            flags[ticket.id]=r?.value==="1";
            console.log(`[MANUAL REFRESH] Quest ${ticket.id}: ${flags[ticket.id]?"ACTIVE":"LOCKED"}`);
          }
          catch(e){
            flags[ticket.id]=false;
            console.log(`[MANUAL REFRESH ERROR] Quest ${ticket.id}:`, e.message);
          }
        }
      } catch(e) {
        console.error('[MANUAL REFRESH] Global timeout or error:', e);
      } finally {
        setActivated(flags);
        setLastCheck(new Date().toLocaleTimeString());
        // Also reload completed scores
        await reloadScores();
        setRefreshing(false);
      }
    };
    return(
      <div style={{maxWidth:760,margin:"0 auto",padding:"24px 16px 40px"}}>
        <div style={{background:zone.bg,border:`2px solid ${zone.accent}`,borderTop:`6px solid ${zone.accent}`,
          padding:"16px 20px",marginBottom:20,boxShadow:pxShadow(zone.accent+"30")}}>
          <div style={{fontFamily:"monospace",fontSize:9,fontWeight:"bold",color:zone.accent,letterSpacing:2,marginBottom:8}}>
            {student.t} · Period {student.p}
          </div>
          <div style={{fontFamily:"monospace",fontSize:18,fontWeight:"bold",color:RB.dark,marginBottom:2}}>
            🎮 {student.n}
            {["0000001","0000002","0000003","0000004"].includes(studentId)&&<span style={{marginLeft:10,fontSize:9,background:RB.teal,color:RB.white,padding:"2px 8px",letterSpacing:1,border:`1px solid ${RB.dark}`}}>∞ RETRIES</span>}
          </div>
          <div style={{fontFamily:"monospace",fontSize:11,color:RB.muted}}>SMC3 Baseline: {student.b}%</div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={{fontFamily:"monospace",fontSize:11,fontWeight:"bold",color:RB.muted,letterSpacing:2}}>SELECT YOUR QUEST</div>
          <button onClick={manualRefresh} disabled={refreshing}
            style={{padding:"4px 10px",fontFamily:"monospace",fontSize:9,fontWeight:"bold",
              background:refreshing?RB.gray2:zone.accent,color:RB.white,
              border:`2px solid ${RB.dark}`,cursor:refreshing?"wait":"pointer",
              boxShadow:pxShadow(),opacity:refreshing?0.6:1}}>
            {refreshing?"⏳ CHECKING...":"🔄 CHECK FOR NEW QUESTS"}
          </button>
        </div>
        <div style={{fontFamily:"monospace",fontSize:9,color:RB.muted,marginBottom:12,textAlign:"right"}}>
          Last checked: {lastCheck}
        </div>
        <div style={{background:RB.gray1,border:`1px solid ${RB.border}`,padding:"8px 12px",
          marginBottom:12,fontFamily:"monospace",fontSize:9,color:RB.muted,lineHeight:1.5}}>
          💡 <strong>Note:</strong> New quests may take 5-20 minutes to appear after your teacher activates them. After you complete a quest, it may take a few seconds to lock. Use the "Check for New Quests" button above to refresh immediately. If the button gets stuck, refresh the page.
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {TICKETS.filter(t=>t.id!==20).map(t=>{
            const isActive=activated[t.id];
            const done=prevScores[t.id];
            const donePct=done?.score_pct;
            return(
              <div key={t.id} style={{background:isActive?RB.white:RB.gray1,
                border:`2px solid ${isActive?zone.accent:RB.border}`,
                borderLeft:`6px solid ${isActive?zone.accent:RB.gray3}`,
                padding:"14px 18px",opacity:isActive?1:0.6,
                boxShadow:isActive?pxShadow():"none"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
                      <span style={{fontFamily:"monospace",fontSize:10,fontWeight:"bold",padding:"2px 8px",
                        background:zone.accent,color:RB.white,border:`1px solid ${RB.dark}`}}>{t.lvl}</span>
                      <span style={{fontFamily:"monospace",fontSize:14,fontWeight:"bold",color:isActive?RB.dark:RB.muted}}>{t.title}</span>
                      {!isActive&&<span style={{fontFamily:"monospace",fontSize:10,color:RB.muted}}>🔒 LOCKED</span>}
                    </div>
                    <div style={{fontSize:11,color:RB.muted,fontFamily:"monospace"}}>{t.date} · {t.teks}</div>
                    {done&&<div style={{marginTop:6,display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:10,fontFamily:"monospace",color:BAND_COLOR(donePct),fontWeight:"bold"}}>
                        ✓ COMPLETED: {donePct}%
                      </span>
                      <span style={{fontSize:10,fontFamily:"monospace",color:RB.muted}}>{BAND_LABEL(donePct)}</span>
                    </div>}
                  </div>
                  {isActive&&!done&&<PixelBtn onClick={()=>startQuest(t.id)} bg={zone.accent} sm>
                    ▶ START
                  </PixelBtn>}
                  {isActive&&done&&["0000001","0000002","0000003","0000004"].includes(studentId)&&<PixelBtn onClick={()=>startQuest(t.id)} bg={RB.teal} sm>
                    🔄 RETRY
                  </PixelBtn>}
                  {isActive&&done&&!["0000001","0000002","0000003","0000004"].includes(studentId)&&<div style={{padding:"5px 14px",fontFamily:"monospace",fontSize:10,
                    color:RB.muted,fontWeight:"bold"}}>🔒 LOCKED</div>}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{marginTop:16,textAlign:"center"}}>
          <button onClick={()=>{setIdLocked(false);setStudent(null);setStudentId("");}}
            style={{background:"none",border:"none",color:RB.muted,fontFamily:"monospace",fontSize:11,
              cursor:"pointer",textDecoration:"underline"}}>← Switch Player</button>
        </div>
      </div>
    );
  }

  // ── Quest in progress ──
  if(idLocked&&activeQuest){
    const quest=TICKETS.find(q=>q.id===activeQuest);
    
    // Anti-copy event handlers
    const preventCopy = (e) => {
      e.preventDefault();
      return false;
    };
    
    const preventTextDrag = (e) => {
      // Allow dragging of interactive elements (buttons, divs with draggable attribute)
      // Block dragging of selected text
      if (e.target.draggable === true || e.target.getAttribute('draggable') === 'true') {
        return; // Allow drag-and-drop elements
      }
      e.preventDefault();
      return false;
    };
    
    return(
      <div style={{maxWidth:800,margin:"0 auto",padding:"20px 16px 40px"}}
        onCopy={preventCopy}
        onCut={preventCopy}
        onPaste={preventCopy}
        onContextMenu={preventCopy}
        onDragStart={preventTextDrag}>
        {/* Quest header */}
        <div style={{background:zone.bg,border:`2px solid ${zone.accent}`,borderTop:`6px solid ${zone.accent}`,
          padding:"12px 18px",marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div>
            <div style={{fontFamily:"monospace",fontSize:9,color:zone.accent,letterSpacing:2,marginBottom:3}}>
              {quest.lvl} · {quest.title}
            </div>
            <div style={{fontFamily:"monospace",fontSize:11,color:RB.muted}}>{quest.teks}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
            <div style={{fontFamily:"monospace",fontSize:11,color:RB.muted}}>
              {student.n} · {student.t} · P{student.p}
            </div>
          </div>
        </div>
        {/* Questions */}
        {!showScore&&qDefs.map(({Comp,key,color})=>(
          <Card key={key} style={{borderTop:`6px solid ${color}`,padding:"20px 20px 18px",marginBottom:14}}>
            <Comp submitted={submitted} onAnswer={v=>setAns(a=>({...a,[key]:v}))}/>
          </Card>
        ))}
        {/* Submit button */}
        {!submitted&&!showScore&&(
          <div style={{textAlign:"center",padding:"14px 0 8px"}}>
            <PixelBtn onClick={handleSubmit} bg={zone.accent} full>⚔ COMPLETE QUEST</PixelBtn>
          </div>
        )}
        {/* Save status */}
        {submitted&&!showScore&&(
          <div style={{textAlign:"center",paddingTop:14}}>
            {saveStatus==="saving"&&<div style={{fontFamily:"monospace",fontSize:11,color:RB.teal,marginBottom:10}}>💾 Saving XP...</div>}
            {saveStatus==="saved"&&<>
              <div style={{fontFamily:"monospace",fontSize:11,color:RB.green,marginBottom:10}}>✓ XP saved!</div>
              {!["0000001","0000002","0000003","0000004"].includes(studentId)&&
                <div style={{fontFamily:"monospace",fontSize:9,color:RB.muted,marginBottom:10}}>This quest will lock after you return to the quest map.</div>}
            </>}
            {saveStatus==="error"&&<div style={{fontFamily:"monospace",fontSize:11,color:RB.red,marginBottom:10}}>⚠ Save failed — tell your teacher.</div>}
            <PixelBtn onClick={()=>setShowScore(true)} bg={RB.yellow} fg={RB.dark}>🏆 SEE MY SCORE</PixelBtn>
          </div>
        )}
        {/* Score screen */}
        {showScore&&qDefs&&(
          <>
            <ScoreScreen score={calcScore()} total={calcTotalPossible()} ticketId={activeQuest} onRetry={reset} studentId={studentId}/>
            <div style={{borderTop:`2px solid ${RB.border}`,marginTop:20,paddingTop:20}}>
              <div style={{fontFamily:"monospace",fontSize:10,color:RB.muted,textAlign:"center",letterSpacing:1,marginBottom:14}}>── REVIEW YOUR ANSWERS ──</div>
              {qDefs.map(({Comp,key,color,reviewProps})=>(
                <Card key={key} style={{borderTop:`6px solid ${color}`,padding:"20px 20px 18px",marginBottom:12}}>
                  <Comp submitted={true} onAnswer={()=>{}} {...(reviewProps?reviewProps(ans):{})}/>
                </Card>
              ))}
            </div>
            <div style={{textAlign:"center",marginTop:16}}>
              <PixelBtn onClick={reset} bg={zone.accent}>← BACK TO QUEST MAP</PixelBtn>
            </div>
          </>
        )}
      </div>
    );
  }

  // ── Student ID entry ──
  return(
    <div style={{maxWidth:760,margin:"0 auto",padding:"24px 16px 40px"}}>
      <Card style={{borderTop:`6px solid ${zone.accent}`,padding:"20px 22px",marginBottom:20}}>
        <div style={{fontFamily:"monospace",fontSize:10,fontWeight:"bold",color:zone.accent,letterSpacing:2,marginBottom:14}}>
          🎮 ENTER YOUR PLAYER ID
        </div>
        <div style={{display:"grid",gridTemplateColumns:"160px 1fr",gap:16,alignItems:"start"}}>
          <div>
            <label style={{fontFamily:"monospace",fontSize:10,color:RB.muted,display:"block",marginBottom:5}}>7-DIGIT STUDENT ID</label>
            <input value={studentId} onChange={e=>lookupId(e.target.value)}
              placeholder="e.g. 4217932"
              style={{border:`2px solid ${idError?RB.red:student?RB.green:RB.border}`,
                padding:"9px 12px",fontSize:16,width:"100%",boxSizing:"border-box",
                fontFamily:"monospace",outline:"none",letterSpacing:2}}/>
            {idError&&<div style={{color:RB.red,fontFamily:"monospace",fontSize:10,marginTop:4}}>⚠ {idError}</div>}
          </div>
          <div>
            {student&&!idLocked&&(
              <div style={{background:"#E8F5E9",border:`2px solid ${RB.green}`,padding:"12px 16px"}}>
                <div style={{fontFamily:"monospace",fontSize:10,color:RB.green,letterSpacing:1,marginBottom:6}}>✓ PLAYER FOUND</div>
                <div style={{fontSize:16,fontWeight:"bold",color:RB.dark,fontFamily:"monospace",marginBottom:4}}>{student.n}</div>
                <div style={{fontFamily:"monospace",fontSize:11,color:RB.muted}}>{student.t} · Period {student.p} · SMC3: {student.b}%</div>
                <div style={{marginTop:12}}><PixelBtn onClick={()=>setIdLocked(true)} bg={RB.green} sm>▶ THAT'S ME — PLAY</PixelBtn></div>
              </div>
            )}
            {idLocked&&student&&(
              <div style={{background:"#EBF3FF",border:`2px solid ${zone.accent}`,padding:"12px 16px"}}>
                <div style={{fontFamily:"monospace",fontSize:10,color:zone.accent,letterSpacing:1,marginBottom:4}}>🔒 LOGGED IN</div>
                <div style={{fontSize:15,fontWeight:"bold",color:RB.dark,fontFamily:"monospace"}}>{student.n}</div>
              </div>
            )}
            {!student&&!idError&&studentId.length<7&&(
              <div style={{fontFamily:"monospace",fontSize:11,color:RB.muted,paddingTop:28}}>Type your 7-digit ID to look up your name.</div>
            )}
            {showRegistration&&(
              <div style={{background:"#FFF3E0",border:`2px solid ${RB.orange}`,padding:"14px 16px"}}>
                <div style={{fontFamily:"monospace",fontSize:10,color:RB.orange,letterSpacing:1,marginBottom:10}}>📝 NEW STUDENT REGISTRATION</div>
                <div style={{marginBottom:10}}>
                  <label style={{fontFamily:"monospace",fontSize:10,color:RB.muted,display:"block",marginBottom:4}}>STUDENT ID</label>
                  <div style={{border:`2px solid ${RB.border}`,padding:"8px 10px",fontSize:13,width:"100%",
                    boxSizing:"border-box",fontFamily:"monospace",letterSpacing:1,background:RB.gray1,color:RB.dark}}>
                    {studentId}
                  </div>
                </div>
                <div style={{marginBottom:10}}>
                  <label style={{fontFamily:"monospace",fontSize:10,color:RB.muted,display:"block",marginBottom:4}}>FULL NAME</label>
                  <input value={regName} onChange={e=>setRegName(e.target.value)}
                    placeholder="FirstName LastName"
                    style={{border:`2px solid ${RB.border}`,padding:"8px 10px",fontSize:13,width:"100%",
                      boxSizing:"border-box",outline:"none"}}/>
                </div>
                <div style={{marginBottom:10}}>
                  <label style={{fontFamily:"monospace",fontSize:10,color:RB.muted,display:"block",marginBottom:4}}>TEACHER</label>
                  <select value={regTeacher} onChange={e=>setRegTeacher(e.target.value)}
                    style={{border:`2px solid ${RB.border}`,padding:"8px 10px",fontSize:13,width:"100%",
                      boxSizing:"border-box",outline:"none"}}>
                    <option value="">Select Teacher</option>
                    <option value="Chinchia">Chinchia</option>
                    <option value="Linam">Linam</option>
                    <option value="Wang">Wang</option>
                    <option value="Ojeda">Ojeda</option>
                  </select>
                </div>
                <div style={{marginBottom:12}}>
                  <label style={{fontFamily:"monospace",fontSize:10,color:RB.muted,display:"block",marginBottom:4}}>PERIOD</label>
                  <select value={regPeriod} onChange={e=>setRegPeriod(e.target.value)}
                    style={{border:`2px solid ${RB.border}`,padding:"8px 10px",fontSize:13,width:"100%",
                      boxSizing:"border-box",outline:"none"}}>
                    <option value="">Select Period</option>
                    <option value="1st/2nd">1st/2nd</option>
                    <option value="3rd/4th">3rd/4th</option>
                    <option value="5th/6th">5th/6th</option>
                    <option value="7th/8th">7th/8th</option>
                  </select>
                </div>
                <PixelBtn onClick={handleNewStudentRegistration} bg={RB.orange} sm full>REGISTER & PLAY</PixelBtn>
                <div style={{fontFamily:"monospace",fontSize:9,color:RB.muted,marginTop:8,lineHeight:1.4}}>
                  Note: You won't have a baseline score, but you'll earn points if you score Meets or Masters.

            )}
          </div>
        </div>
      </Card>
      
      {/* XP System Banner */}
      <div style={{background:"linear-gradient(135deg, #1a1a2e 0%, #16213e 100%)",border:`3px solid ${RB.dark}`,
        padding:"24px 20px",marginBottom:20,borderRadius:0}}>
        <div style={{fontFamily:"monospace",fontSize:10,color:"#FFC107",letterSpacing:3,textAlign:"center",marginBottom:16}}>
          POINT SYSTEM & LEADERBOARD
        </div>
        <div style={{fontSize:18,fontWeight:"bold",color:RB.white,textAlign:"center",marginBottom:20,lineHeight:1.4}}>
          How your class earns points and climbs the board.

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(110px, 1fr))",gap:10,marginBottom:16}}>

// ─── LEADERBOARD ──────────────────────────────────────────────────────────────
function LeaderboardMode(){
  const [subs,setSubs]=useState({});
  const [loading,setLoading]=useState(true);
  const [lastRefresh,setLR]=useState(null);

  const loadSubs=useCallback(async()=>{
    setLoading(true);
    try{
      const rawSubs = await window.storage.loadTicketSubs();
      const newSubs={};
      Object.entries(rawSubs).forEach(([key,obj])=>{
        const k=`${obj.quest||1}:${obj.id}`;
        newSubs[k]=obj;
      });
      setSubs(newSubs);setLR(new Date().toLocaleTimeString());
    }catch(e){console.error(e);}
    setLoading(false);
  },[]);

  useEffect(()=>{loadSubs();const t=setInterval(loadSubs,30000);return()=>clearInterval(t);},[loadSubs]);

  // Build class stats with class bonuses
  const classStats=TEACHERS.flatMap(teacher=>
    PERIODS.map(period=>{
      const names=TRACKER_ORDER[teacher+"_"+period]||[];
      const total=names.length;
      let totalPts=0,subCount=0,avgPct=null,pctSum=0;
      
      // Calculate class bonuses for each quest
      const classBonuses = {};
      TICKETS.forEach(q=>{
        const classSubmissions = [];
        names.forEach(name=>{
          const entry=Object.values(ROSTER).find(s=>s.n===name&&s.t===teacher&&s.p===period);
          const sid=entry?Object.keys(ROSTER).find(k=>ROSTER[k]===entry):null;
          if(!sid)return;
          // Skip preview accounts
          if(["0000001","0000002","0000003","0000004"].includes(sid))return;
          const sub=subs[q.id+":"+sid];
          if(sub){
            classSubmissions.push({
              score_pct:sub.score_pct,
              smc3:sub.smc3
            });
          }
        });
        // Calculate bonus for this quest
        if(classSubmissions.length > 0){
          classBonuses[q.id] = calcClassBonus(classSubmissions);
        }
      });
      
      // Calculate student points including class bonuses
      names.forEach(name=>{
        const entry=Object.values(ROSTER).find(s=>s.n===name&&s.t===teacher&&s.p===period);
        const sid=entry?Object.keys(ROSTER).find(k=>ROSTER[k]===entry):null;
        if(!sid)return;
        // Skip preview accounts
        if(["0000001","0000002","0000003","0000004"].includes(sid))return;
        let studentPts=0,studentSubs=0,studentPctSum=0;
        TICKETS.forEach(q=>{
          const sub=subs[q.id+":"+sid];
          if(sub){
            const isBoss = [5,12,16].includes(q.id); // Boss Fight quests
            // Add individual XP
            studentPts+=calcPts(sub.score_pct,sub.smc3,isBoss);
            // Add class bonus for this quest
            studentPts+=(classBonuses[q.id]||0);
            studentSubs++;
            studentPctSum+=sub.score_pct;
          }
        });
        if(studentSubs>0){subCount++;pctSum+=studentPctSum/studentSubs;totalPts+=studentPts;}
      });
      avgPct=subCount>0?Math.round(pctSum/subCount):null;
      return{teacher,period,total,subCount,pts:totalPts,avgPct,label:teacher+" · "+period};
    })
  ).sort((a,b)=>b.pts-a.pts);

  let rank=1;
  classStats.forEach((c,i)=>{
    if(i>0&&c.pts===classStats[i-1].pts)c.rank=classStats[i-1].rank;
    else c.rank=rank;rank++;
  });

  const MEDAL=["🥇","🥈","🥉"];
  const totalSubs=Object.keys(subs).length;
  const zone=ZONE_COLORS[1];

  return(
    <div style={{background:RB.bg,minHeight:"80vh",padding:"0 0 40px"}}>
      {/* Top bar */}
      <div style={{background:RB.panel,borderBottom:`2px solid ${RB.border}`,
        padding:"10px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:11,fontFamily:"monospace",color:RB.muted}}>
          {totalSubs} submissions · Auto-refreshes every 30s · Last: {lastRefresh||"—"}{loading&&" · 🔄"}
        </div>
        <PixelBtn onClick={loadSubs} bg={RB.teal} sm>🔄 REFRESH</PixelBtn>
      </div>

      <div style={{padding:"20px 16px",maxWidth:900,margin:"0 auto"}}>
        {/* Title */}
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{fontFamily:"monospace",fontSize:10,color:RB.muted,letterSpacing:2,marginBottom:6}}>
            ── ZONE 1 LEADERBOARD ──
          </div>
          <div style={{fontFamily:"monospace",fontSize:22,fontWeight:"bold",color:RB.dark,letterSpacing:1}}>
            🏆 SERVER STANDINGS
          </div>
        </div>

        {/* Podium — only shown once multiple teachers are on the board */}
        {classStats.filter(c=>c.pts>0).map(c=>c.teacher).filter((t,i,a)=>a.indexOf(t)===i).length>=3&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1.2fr 1fr",gap:12,alignItems:"end",maxWidth:560,margin:"0 auto 28px"}}>
            {[classStats[1],classStats[0],classStats[2]].map((c,i)=>{
              if(!c)return (<div key={i}/>);
              const heights=["150px","190px","130px"];
              const cols=[RB.muted,RB.yellow,"#CD7F32"];
              const pos=[1,0,2];
              return(
                <div key={i} style={{background:RB.white,border:`2px solid ${RB.dark}`,
                  borderBottom:`6px solid ${cols[i]}`,
                  height:heights[i],display:"flex",flexDirection:"column",
                  alignItems:"center",justifyContent:"center",gap:5,padding:12,
                  boxShadow:pxShadow()}}>
                  <div style={{fontSize:24}}>{MEDAL[pos[i]]}</div>
                  <div style={{fontSize:10,fontFamily:"monospace",fontWeight:"bold",textAlign:"center",color:RB.dark}}>{c.teacher.toUpperCase()}</div>
                  <div style={{fontSize:10,fontFamily:"monospace",color:RB.muted,textAlign:"center"}}>{c.period}</div>
                  <div style={{fontSize:22,fontWeight:"bold",fontFamily:"monospace",color:cols[i]}}>{c.pts}</div>
                  <div style={{fontSize:9,fontFamily:"monospace",color:RB.muted}}>XP</div>
                </div>
              );
            })}
          </div>
        )}
        {/* Podium placeholder — shown until competition is live */}
        {classStats.filter(c=>c.pts>0).map(c=>c.teacher).filter((t,i,a)=>a.indexOf(t)===i).length<3&&(
          <div style={{textAlign:"center",padding:"20px 0 28px",fontFamily:"monospace",color:RB.muted,fontSize:12}}>
            🏆 Podium unlocks once all four teachers have XP on the board — activate your quests to get started!
          </div>
        )}

        {/* Full table */}
        <div style={{background:RB.white,border:`2px solid ${RB.border}`,boxShadow:pxShadow(RB.gray3),overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{background:RB.dark}}>
                {["RANK","CLASS","TEACHER","SUBMITTED","AVG SCORE","⚡ XP","STATUS"].map(h=>(
                  <th key={h} style={{padding:"9px 12px",textAlign:"left",color:RB.white,
                    fontFamily:"monospace",fontWeight:"bold",fontSize:10,letterSpacing:0.5,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {classStats.map((c,i)=>{
                const medal=c.rank<=3?MEDAL[c.rank-1]:"";
                return(
                  <tr key={i} style={{borderBottom:`1px solid ${RB.border}`,
                    background:c.rank===1?"#FFFBEB":i%2===0?RB.white:RB.gray1}}>
                    <td style={{padding:"8px 12px",fontFamily:"monospace",fontWeight:"bold",
                      color:c.rank<=3?RB.yellow:RB.muted,fontSize:14}}>{medal||c.rank}</td>
                    <td style={{padding:"8px 12px",fontFamily:"monospace",fontWeight:"bold",color:RB.dark}}>{c.period}</td>
                    <td style={{padding:"8px 12px",fontFamily:"monospace",color:RB.muted}}>{c.teacher}</td>
                    <td style={{padding:"8px 12px",fontFamily:"monospace",color:RB.muted}}>{c.subCount}/{c.total}</td>
                    <td style={{padding:"8px 12px"}}>
                      {c.avgPct!==null
                        ?<span style={{color:BAND_COLOR(c.avgPct),fontWeight:"bold",fontFamily:"monospace"}}>{c.avgPct}%</span>
                        :<span style={{color:RB.muted,fontFamily:"monospace"}}>—</span>}
                    </td>
                    <td style={{padding:"8px 12px"}}>
                      <span style={{background:c.pts>0?RB.yellow:RB.gray2,color:c.pts>0?RB.dark:RB.muted,
                        padding:"3px 12px",fontWeight:"bold",fontFamily:"monospace",fontSize:13,
                        border:`2px solid ${c.pts>0?RB.dark:RB.border}`,display:"inline-block"}}>
                        +{c.pts}
                      </span>
                    </td>
                    <td style={{padding:"8px 12px",fontFamily:"monospace",fontSize:10}}>
                      {c.subCount===c.total
                        ?<span style={{color:RB.green}}>✓ ALL IN</span>
                        :c.subCount>0
                          ?<span style={{color:RB.orange}}>{c.total-c.subCount} pending</span>
                          :<span style={{color:RB.muted}}>not started</span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{marginTop:14,padding:"10px 14px",background:RB.gray1,border:`1px solid ${RB.border}`,
          fontFamily:"monospace",fontSize:10,color:RB.muted,lineHeight:1.8}}>
          ⚡ XP RULES: Beat SMC3 baseline → +1 XP per player. Cross a performance band → +3 XP. Raid Boss ≥52% → +10 XP class. Raid Boss ≥77% → +20 XP class.
        </div>
      </div>
    </div>
  );
}

// ─── TEACHER DASHBOARD ────────────────────────────────────────────────────────
// ─── RESET SUBMISSIONS PANEL ──────────────────────────────────────────────────
function ResetPanel({subs,onReset}){
  const [selectedTicket,setSelectedTicket]=useState(null);
  const [deleting,setDeleting]=useState({});
  const [deletingAll,setDeletingAll]=useState(false);
  const [confirmAll,setConfirmAll]=useState(false);
  const [msg,setMsg]=useState("");

  const ticketSubs=selectedTicket
    ?Object.entries(subs).filter(([k])=>k.startsWith("ticket"+selectedTicket+":"))
    :[];

  const flash=(m)=>{setMsg(m);setTimeout(()=>setMsg(""),3000);};

  const deleteOne=async(key)=>{
    setDeleting(d=>({...d,[key]:true}));
    try{
      await window.storage.delete(key,true);
      flash("✓ Reset "+subs[key]?.name);
      setTimeout(onReset,600);
    }catch(e){flash("⚠ Error deleting "+key);}
    setDeleting(d=>({...d,[key]:false}));
  };

  const deleteAll=async()=>{
    setDeletingAll(true);
    setConfirmAll(false);
    let count=0;
    for(const [key] of ticketSubs){
      try{await window.storage.delete(key,true);count++;}catch(e){}
    }
    flash(`✓ Reset ${count} submission${count!==1?"s":""} for Quest ${selectedTicket}`);
    setDeletingAll(false);
    setTimeout(onReset,600);
  };

  return(
    <div style={{background:RB.white,border:`2px solid ${RB.border}`,
      borderTop:`5px solid ${RB.red}`,padding:"16px 18px",marginBottom:16,boxShadow:pxShadow(RB.gray3)}}>
      <div style={{fontFamily:"monospace",fontSize:11,fontWeight:"bold",color:RB.dark,
        letterSpacing:1,marginBottom:12}}>🗑️ RESET SUBMISSIONS — ALLOW STUDENTS TO RETAKE</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
        {TICKETS.filter(t=>t.id!==20).map(t=>{
          const count=Object.keys(subs).filter(k=>k.startsWith("ticket"+t.id+":")).length;
          const zone=ZONE_COLORS[t.zone];
          const sel=selectedTicket===t.id;
          return(
            <button key={t.id} onClick={()=>setSelectedTicket(sel?null:t.id)}
              style={{padding:"7px 12px",fontFamily:"monospace",fontSize:10,fontWeight:"bold",
                cursor:"pointer",border:`2px solid ${sel?zone.accent:RB.border}`,
                background:sel?zone.bg:RB.gray1,color:sel?zone.accent:RB.muted,
                boxShadow:sel?pxShadow():"none"}}>
              {t.lvl}<br/>
              <span style={{fontSize:9,color:count>0?RB.red:RB.muted}}>{count} sub{count!==1?"s":""}</span>
            </button>
          );
        })}
      </div>

      {selectedTicket&&(
        <div style={{background:RB.gray1,border:`1px solid ${RB.border}`,padding:"12px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:8}}>
            <div style={{fontFamily:"monospace",fontSize:12,fontWeight:"bold",color:RB.dark}}>
              {TICKETS.find(t=>t.id===selectedTicket)?.lvl} — {ticketSubs.length} submission{ticketSubs.length!==1?"s":""}
            </div>
            {ticketSubs.length>0&&(
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                {!confirmAll?(
                  <button onClick={()=>setConfirmAll(true)} disabled={deletingAll}
                    style={{padding:"6px 14px",fontFamily:"monospace",fontSize:10,fontWeight:"bold",
                      cursor:"pointer",border:`2px solid ${RB.red}`,
                      background:"transparent",color:RB.red,boxShadow:pxShadow(),letterSpacing:1}}>
                    🗑️ RESET ALL ({ticketSubs.length})
                  </button>
                ):(
                  <>
                    <span style={{fontFamily:"monospace",fontSize:10,color:RB.red,fontWeight:"bold"}}>Sure? This can't be undone.</span>
                    <button onClick={deleteAll} disabled={deletingAll}
                      style={{padding:"6px 14px",fontFamily:"monospace",fontSize:10,fontWeight:"bold",
                        cursor:deletingAll?"wait":"pointer",border:`2px solid ${RB.red}`,
                        background:RB.red,color:RB.white,letterSpacing:1}}>
                      {deletingAll?"⏳ RESETTING...":"✓ YES, RESET ALL"}
                    </button>
                    <button onClick={()=>setConfirmAll(false)}
                      style={{padding:"6px 14px",fontFamily:"monospace",fontSize:10,fontWeight:"bold",
                        cursor:"pointer",border:`2px solid ${RB.border}`,
                        background:RB.gray1,color:RB.muted}}>
                      CANCEL
                    </button>
                  </>
                )}
              </div>
            )}
          </div>
          {ticketSubs.length===0?(
            <div style={{fontFamily:"monospace",fontSize:11,color:RB.muted,padding:"8px 0"}}>
              No submissions yet for this quest.
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:280,overflowY:"auto"}}>
              {ticketSubs.map(([key,sub])=>(
                <div key={key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  background:RB.white,border:`1px solid ${RB.border}`,padding:"6px 10px",gap:8}}>
                  <div>
                    <span style={{fontFamily:"monospace",fontSize:11,fontWeight:"bold",color:RB.dark}}>{sub.name}</span>
                    <span style={{fontFamily:"monospace",fontSize:10,color:RB.muted,marginLeft:8}}>{sub.teacher} · {sub.period}</span>
                    <span style={{fontFamily:"monospace",fontSize:10,color:RB.blue,marginLeft:8}}>{sub.score_pct}%</span>
                  </div>
                  <button onClick={()=>deleteOne(key)} disabled={deleting[key]}
                    style={{padding:"4px 10px",fontFamily:"monospace",fontSize:10,fontWeight:"bold",
                      cursor:deleting[key]?"wait":"pointer",border:`1px solid ${RB.red}`,
                      background:"transparent",color:RB.red,flexShrink:0}}>
                    {deleting[key]?"...":"✕ RESET"}
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      {msg&&<div style={{marginTop:8,fontFamily:"monospace",fontSize:11,
        color:msg.startsWith("⚠")?RB.red:RB.green}}>{msg}</div>}
    </div>
  );
}

function TeacherDashboard({teacherKey}){
  const visibleTeachers=teacherKey==="Bermudez"?TEACHERS:[teacherKey];
  const [subs,setSubs]=useState({});
  const [loading,setLoading]=useState(true);
  const [lastRefresh,setLR]=useState(null);
  const [activeTeacher,setAT]=useState(visibleTeachers[0]);
  const [activePeriod,setAP]=useState("All");
  const [activeQuestTab,setAQT]=useState(1);
  const [activations,setActivations]=useState({});
  const [toggling,setToggling]=useState({});
  const [copyMsg,setCopyMsg]=useState("");

  const loadSubmissions=useCallback(async()=>{
    setLoading(true);
    try{
      const newSubs = await window.storage.loadTicketSubs();
      setSubs(newSubs);
      setLR(new Date().toLocaleTimeString());
    }catch(e){console.error(e);}
    setLoading(false);
  },[]);

  const loadActivations=useCallback(async()=>{
    // Load activation flags once on dashboard mount
    const flags={};
    for(const ticket of TICKETS){
      try{const r=await window.storage.get(`active:ticket${ticket.id}:${teacherKey}`,true);flags[ticket.id]=r?.value==="1";}
      catch(e){flags[ticket.id]=false;}
    }
    setActivations(flags);
  },[teacherKey]);

  useEffect(()=>{
    // Load activations once on mount
    loadActivations();
  },[loadActivations]);

  useEffect(()=>{
    // Load submissions on mount and every 30 seconds
    loadSubmissions();
    const t=setInterval(loadSubmissions,30000);
    return()=>clearInterval(t);
  },[loadSubmissions]);

  const toggleActivation=async(qId)=>{
    console.log(`[TEACHER DEBUG] Toggling Quest ${qId} for teacher "${teacherKey}"`);
    const next=!activations[qId];
    // Update local state IMMEDIATELY (optimistic update)
    setActivations(a=>({...a,[qId]:next}));
    setToggling(t=>({...t,[qId]:true}));
    console.log(`[TEACHER DEBUG] Quest ${qId} will be set to: ${next?"ACTIVE":"LOCKED"}`);
    try{
      const storageKey = `active:ticket${qId}:${teacherKey}`;
      const storageValue = next?"1":"0";
      console.log(`[TEACHER DEBUG] Setting shared storage: key="${storageKey}", value="${storageValue}"`);
      await window.storage.set(storageKey,storageValue,true);
      await SheetsSync.syncActivation({
        ticket_id: qId,
        teacher: teacherKey,
        action: next ? "activated" : "deactivated",
        timestamp: new Date().toISOString()
      });
      console.log(`[TEACHER DEBUG] ✓ Quest ${qId} successfully toggled to ${next?"ACTIVE":"LOCKED"}`);
      // Verify it was saved
      const verify = await window.storage.get(storageKey,true);
      console.log(`[TEACHER DEBUG] Verification read: value="${verify?.value}"`);
      setTimeout(()=>setToggling(t=>({...t,[qId]:false})),500);
    }catch(e){
      console.error(`[TEACHER DEBUG ERROR] Quest ${qId}:`,e);
      // Revert on error
      setActivations(a=>({...a,[qId]:!next}));
      setToggling(t=>({...t,[qId]:false}));
    }
  };

  const getStudents=(teacher,period,ticketId=null)=>{
    const names=TRACKER_ORDER[teacher+"_"+period]||[];
    return names.map(name=>{
      const entry=Object.values(ROSTER).find(s=>s.n===name&&s.t===teacher&&s.p===period);
      const sid=entry?Object.keys(ROSTER).find(k=>ROSTER[k]===entry):null;
      // Skip preview accounts in teacher dashboard
      if(sid && ["0000001","0000002","0000003","0000004"].includes(sid))return null;
      const questSubs={};
      TICKETS.forEach(q=>{
        const key="ticket"+q.id+":"+sid;
        if(sid&&subs[key])questSubs[q.id]=subs[key];
      });
      // Use quest-specific SMC3 if ticketId provided, otherwise use overall baseline
      const smc3Score = ticketId && sid ? getQuestSMC3(sid, ticketId) : (entry?.b || null);
      return{name,sid,smc3:smc3Score!==null?smc3Score:"—",subs:questSubs};
    }).filter(Boolean); // Remove null entries (preview accounts)
  };

  const copyForTracker=(period,ticketId)=>{
    const students=getStudents(activeTeacher,period,ticketId);
    const text=students.map(s=>s.subs[ticketId]?String(s.subs[ticketId].score_pct):"").join("\n");
    navigator.clipboard.writeText(text).then(()=>{
      setCopyMsg(`Copied Q${ticketId} · ${activeTeacher} · ${period} (${students.length} rows)`);
      setTimeout(()=>setCopyMsg(""),3000);
    });
  };

  const rows=activePeriod==="All"
    ?PERIODS.flatMap(p=>getStudents(activeTeacher,p,typeof activeQuestTab==="number"?activeQuestTab:null).map(s=>({...s,period:p})))
    :getStudents(activeTeacher,activePeriod,typeof activeQuestTab==="number"?activeQuestTab:null).map(s=>({...s,period:activePeriod}));

  const totalSubs=Object.keys(subs).length;

  return(
    <div style={{background:RB.bg,minHeight:"80vh"}}>
      {/* Top bar */}
      <div style={{background:RB.panel,borderBottom:`2px solid ${RB.border}`,
        padding:"10px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:11,fontFamily:"monospace",color:RB.muted}}>
          {totalSubs} total submissions · Last: {lastRefresh||"—"}{loading&&" · 🔄"}
        </div>
        <PixelBtn onClick={loadSubmissions} bg={RB.teal} sm>🔄 REFRESH</PixelBtn>
      </div>

      <div style={{padding:"16px",maxWidth:1100,margin:"0 auto"}}>
        {/* QUEST ACTIVATION PANEL */}
        <div style={{background:RB.white,border:`2px solid ${RB.border}`,
          borderTop:`5px solid ${RB.yellow}`,padding:"16px 18px",marginBottom:16,boxShadow:pxShadow(RB.gray3)}}>
          <div style={{fontFamily:"monospace",fontSize:11,fontWeight:"bold",color:RB.dark,
            letterSpacing:1,marginBottom:12}}>⚡ QUEST ACTIVATION — UNLOCK FOR STUDENTS</div>
          <div style={{background:RB.gray1,border:`1px solid ${RB.border}`,padding:"8px 12px",
            marginBottom:12,fontFamily:"monospace",fontSize:9,color:RB.muted,lineHeight:1.5}}>
            ⏱️ <strong>Storage Delay:</strong> After activating quests, it may take 5-20 minutes for students to see them. Students can use their "Check for New Quests" button to refresh manually. If delays are severe, have students refresh the page.
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
            {TICKETS.map(t=>{
              const on=activations[t.id];
              const zone=ZONE_COLORS[t.zone];
              return(
                <div key={t.id} style={{border:`2px solid ${on?zone.accent:RB.border}`,
                  background:on?zone.bg:RB.gray1,padding:"12px 14px"}}>
                  <div style={{fontFamily:"monospace",fontSize:10,fontWeight:"bold",
                    color:on?zone.accent:RB.muted,marginBottom:4}}>{t.lvl}</div>
                  <div style={{fontFamily:"monospace",fontSize:12,fontWeight:"bold",color:RB.dark,marginBottom:8}}>{t.title}</div>
                  <button onClick={()=>!toggling[t.id]&&toggleActivation(t.id)}
                    style={{width:"100%",padding:"7px 0",fontFamily:"monospace",fontSize:11,fontWeight:"bold",
                      cursor:toggling[t.id]?"wait":"pointer",border:`2px solid ${RB.dark}`,
                      background:on?RB.green:RB.muted,color:RB.white,
                      boxShadow:pxShadow(),letterSpacing:1}}>
                    {toggling[t.id]?"✓":(on?"🔓 ACTIVE":"🔒 LOCKED")}
                  </button>
                </div>
              );
            })}
          </div>
          <div style={{marginTop:10,fontFamily:"monospace",fontSize:10,color:RB.muted}}>
            Toggle a quest to lock/unlock it for all students. Only active quests appear on the student quest map.
          </div>
        </div>

        {/* RESET SUBMISSIONS PANEL */}
        <ResetPanel subs={subs} onReset={loadSubmissions}/>

        {/* Teacher tabs */}
        {visibleTeachers.length>1&&(
          <div style={{display:"flex",gap:0,marginBottom:14,borderBottom:`3px solid ${RB.yellow}`}}>
            {visibleTeachers.map(t=>(
              <button key={t} onClick={()=>{setAT(t);setAP("All");}}
                style={{padding:"8px 20px",border:"none",fontFamily:"monospace",fontSize:12,fontWeight:"bold",
                  cursor:"pointer",background:activeTeacher===t?RB.yellow:"transparent",
                  color:activeTeacher===t?RB.dark:RB.muted,
                  borderBottom:activeTeacher===t?`3px solid ${RB.dark}`:"3px solid transparent"}}>
                ⚡ {t.toUpperCase()}
              </button>
            ))}
          </div>
        )}

        {/* Period cards */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
          {PERIODS.map(p=>{
            const students=getStudents(activeTeacher,p);
            const done=students.filter(s=>Object.keys(s.subs).length>0);
            const avgPct=done.length>0?Math.round(done.reduce((a,s)=>{
              const pcts=Object.values(s.subs).map(sb=>sb.score_pct);
              return a+(pcts.reduce((x,y)=>x+y,0)/pcts.length);
            },0)/done.length):null;
            return(
              <div key={p} onClick={()=>setAP(activePeriod===p?"All":p)}
                style={{background:activePeriod===p?RB.white:RB.gray1,
                  border:`2px solid ${activePeriod===p?RB.yellow:RB.border}`,
                  borderTop:`4px solid ${avgPct!==null?BAND_COLOR(avgPct):RB.border}`,
                  padding:"11px",cursor:"pointer"}}>
                <div style={{fontFamily:"monospace",fontSize:11,fontWeight:"bold",color:RB.dark,marginBottom:3}}>{p}</div>
                <div style={{fontFamily:"monospace",fontSize:11,color:RB.muted}}>{done.length}/{students.length} active</div>
                <div style={{fontSize:14,fontWeight:"bold",fontFamily:"monospace",
                  color:avgPct!==null?BAND_COLOR(avgPct):RB.muted,marginTop:2}}>
                  {avgPct!==null?avgPct+"%":"—"}
                </div>
              </div>
            );
          })}
        </div>

        {/* Quest tabs */}
        <div style={{display:"flex",borderBottom:`2px solid ${RB.border}`,marginBottom:0,overflowX:"auto",flexWrap:"nowrap"}}>
          {TICKETS.filter(t=>t.id!==20).map(t=>(
            <button key={t.id} onClick={()=>setAQT(t.id)}
              style={{padding:"7px 16px",border:"none",fontFamily:"monospace",fontSize:11,fontWeight:"bold",
                cursor:"pointer",background:activeQuestTab===t.id?RB.white:RB.gray1,
                color:activeQuestTab===t.id?ZONE_COLORS[t.zone].accent:RB.muted,
                borderBottom:activeQuestTab===t.id?`3px solid ${ZONE_COLORS[t.zone].accent}`:"3px solid transparent"}}>
              {t.lvl}
            </button>
          ))}
          <button onClick={()=>setAQT("export")}
            style={{padding:"7px 16px",border:"none",fontFamily:"monospace",fontSize:11,fontWeight:"bold",
              cursor:"pointer",background:activeQuestTab==="export"?RB.white:RB.gray1,
              color:activeQuestTab==="export"?RB.teal:RB.muted,
              borderBottom:activeQuestTab==="export"?`3px solid ${RB.teal}`:"3px solid transparent"}}>
            📤 EXPORT
          </button>
        </div>

        {/* Student table */}
        {typeof activeQuestTab==="number"&&(
          <div style={{overflowX:"auto",background:RB.white,border:`2px solid ${RB.border}`,borderTop:"none"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr style={{background:RB.dark}}>
                  {["#","NAME","PERIOD","SMC3","SCORE","BAND","XP","TIME","STATUS"].map(h=>(
                    <th key={h} style={{padding:"7px 10px",textAlign:"left",color:RB.white,
                      fontFamily:"monospace",fontSize:10,fontWeight:"bold",letterSpacing:0.5,whiteSpace:"nowrap"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((s,i)=>{
                  const sub=s.subs[activeQuestTab];
                  const hasSub=!!sub;
                  const etPct=hasSub?sub.score_pct:null;
                  const pts=hasSub?calcPts(etPct,s.smc3):0;
                  return(
                    <tr key={i} style={{borderBottom:`1px solid ${RB.border}`,
                      background:i%2===0?RB.white:RB.gray1,opacity:hasSub?1:0.5}}>
                      <td style={{padding:"5px 10px",fontFamily:"monospace",color:RB.muted,fontSize:10}}>{i+1}</td>
                      <td style={{padding:"5px 10px",fontFamily:"monospace",fontWeight:hasSub?"bold":"normal",
                        color:hasSub?RB.dark:RB.muted,whiteSpace:"nowrap"}}>{s.name}</td>
                      <td style={{padding:"5px 10px",fontFamily:"monospace",color:RB.muted,fontSize:11}}>{s.period}</td>
                      <td style={{padding:"5px 10px",fontFamily:"monospace",color:RB.muted,fontSize:11}}>
                        {s.smc3!=="—"?s.smc3+"%":"—"}
                      </td>
                      <td style={{padding:"5px 10px"}}>
                        {etPct!==null
                          ?<span style={{background:BAND_COLOR(etPct),color:RB.white,padding:"2px 10px",
                              fontFamily:"monospace",fontWeight:"bold",fontSize:12,display:"inline-block",
                              border:`1px solid ${RB.dark}`}}>{etPct}%</span>
                          :<span style={{color:RB.muted,fontFamily:"monospace"}}>—</span>}
                      </td>
                      <td style={{padding:"5px 10px",fontFamily:"monospace",fontSize:10,
                        color:etPct!==null?BAND_COLOR(etPct):RB.muted,fontWeight:"bold"}}>
                        {etPct!==null?BAND_LABEL(etPct):"pending"}
                      </td>
                      <td style={{padding:"5px 10px",textAlign:"center",fontFamily:"monospace",fontWeight:"bold",
                        color:pts>0?RB.yellow:RB.muted}}>
                        {hasSub?"+"+pts:"—"}
                      </td>
                      <td style={{padding:"5px 10px",fontFamily:"monospace",color:RB.muted,fontSize:9,whiteSpace:"nowrap"}}>
                        {hasSub?new Date(sub.timestamp).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"—"}
                      </td>
                      <td style={{padding:"5px 10px",fontFamily:"monospace",fontSize:10}}>
                        {hasSub?(etPct>=67?<span style={{color:RB.green}}>✓ OK</span>:<span style={{color:RB.red}}>⚠ RETEACH</span>)
                          :<span style={{color:RB.muted}}>pending</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        {/* Export tab */}
        {activeQuestTab==="export"&&(
          <div style={{background:RB.white,border:`2px solid ${RB.border}`,borderTop:"none",padding:16}}>
            {copyMsg&&<div style={{background:RB.green,color:RB.white,padding:"9px 14px",
              fontFamily:"monospace",fontSize:11,marginBottom:12,border:`2px solid ${RB.dark}`}}>✓ {copyMsg}</div>}
            <div style={{fontFamily:"monospace",fontSize:11,color:RB.muted,marginBottom:14,lineHeight:1.7}}>
              Click <strong style={{color:RB.dark}}>COPY</strong> next to a period → paste into your tracker spreadsheet.
            </div>
            {TICKETS.map(t=>(
              <div key={t.id} style={{marginBottom:20}}>
                <div style={{fontFamily:"monospace",fontSize:11,fontWeight:"bold",color:ZONE_COLORS[t.zone].accent,
                  marginBottom:8,letterSpacing:1}}>{t.lvl} — {t.title}</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:10}}>
                  {PERIODS.map(period=>{
                    const students=getStudents(activeTeacher,period,t.id);
                    const done=students.filter(s=>s.subs[t.id]);
                    return(
                      <div key={period} style={{border:`2px solid ${RB.border}`,borderTop:`4px solid ${RB.teal}`,padding:12,background:RB.gray1}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                          <span style={{fontFamily:"monospace",fontSize:11,fontWeight:"bold",color:RB.dark}}>{period}</span>
                          <PixelBtn onClick={()=>copyForTracker(period,t.id)} bg={RB.teal} sm>📋 COPY</PixelBtn>
                        </div>
                        <div style={{fontFamily:"monospace",fontSize:10,color:RB.muted,marginBottom:6}}>
                          {done.length}/{students.length} submitted
                        </div>
                        <div style={{maxHeight:140,overflowY:"auto"}}>
                          {students.map((s,i)=>(
                            <div key={i} style={{display:"flex",justifyContent:"space-between",
                              padding:"2px 0",borderBottom:`1px solid ${RB.border}`,opacity:s.subs[t.id]?1:0.4}}>
                              <span style={{fontFamily:"monospace",fontSize:10,color:RB.text}}>{i+1}. {s.name}</span>
                              <span style={{fontFamily:"monospace",fontSize:10,fontWeight:"bold",
                                color:s.subs[t.id]?BAND_COLOR(s.subs[t.id].score_pct):RB.muted}}>
                                {s.subs[t.id]?s.subs[t.id].score_pct+"%":"—"}
                              </span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function DayDetail({day,color}){
  return(
    <div style={{borderTop:`2px solid ${color}30`,background:`${color}06`,padding:"18px 22px"}}>
      <div style={{display:"grid",gridTemplateColumns:day.why?"1fr 1fr":"1fr",gap:20}}>
        <div>
          <div style={{fontFamily:"monospace",fontSize:10,fontWeight:"bold",color:color,
            textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>📋 LESSON FOCUS</div>
          <p style={{fontSize:13,color:RB.text,lineHeight:1.7,margin:0}}>{day.focus}</p>
        </div>
        {day.why&&(
          <div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>

            {pct:"36%",code:"8.5(H)",desc:"Prop/Non-prop functions",color:RB.orange,bg:"#FFF3E0"},
            {pct:"37%",code:"8.5(A)",desc:"y = kx representations",color:RB.orange,bg:"#FFF3E0"},

              <div style={{fontSize:12,fontWeight:"bold",color:RB.dark,margin:"3px 0",fontFamily:"monospace"}}>{s.code}</div>
              <div style={{fontSize:11,color:RB.muted}}>{s.desc}</div>
            </div>
          ))}
        </div>
      </div>
      {/* Rationale accordion */}
      <div style={{fontFamily:"monospace",fontSize:12,fontWeight:"bold",color:RB.dark,
        textTransform:"uppercase",letterSpacing:1,marginBottom:14,paddingBottom:8,borderBottom:`3px solid ${RB.orange}`}}>
        🧠 Pairing Rationale — Why These SEs Are Taught Together
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {RATIONALE.map((zone,zi)=>(
          <div key={zi} style={{background:RB.white,border:`2px solid ${RB.border}`,overflow:"hidden",boxShadow:pxShadow(RB.gray3)}}>
            <button onClick={()=>setOpenR(openR===zi?null:zi)}
              style={{width:"100%",background:"none",border:"none",cursor:"pointer",
                padding:"13px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",
                borderLeft:`5px solid ${zone.color}`}}>
              <span style={{fontFamily:"monospace",fontSize:13,fontWeight:"bold",color:zone.color}}>{zone.zone}</span>
              <span style={{fontSize:18,color:zone.color,lineHeight:1}}>{openR===zi?"−":"+"}</span>
            </button>
            {openR===zi&&(
              <div style={{padding:"0 18px 18px"}}>
                {zone.pairs.map((pair,pi)=>(
                  <div key={pi} style={{marginTop:14,paddingTop:14,borderTop:pi>0?`1px solid ${RB.border}`:"none"}}>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
                      {pair.ses.map((s,si)=>{
                        const isR=s.includes(" R"),isFlag=s.includes("⚠");
                        return(
                          <span key={si} style={{fontSize:10,fontWeight:"bold",padding:"2px 8px",
                            fontFamily:"monospace",
                            background:isFlag?"#FFEBEE":isR?"#FFF3E0":"#E8F5E9",
                            color:isFlag?RB.red:isR?RB.orange:RB.green,
                            border:`1px solid ${isFlag?RB.red:isR?RB.orange:RB.green}40`}}>{s}</span>
                        );
                      })}
                    </div>
                    <p style={{fontSize:13,color:RB.text,lineHeight:1.75,margin:0}}>{pair.reason}</p>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
      <div style={{marginTop:24,padding:"12px 16px",background:RB.gray1,border:`1px solid ${RB.border}`,
        fontFamily:"monospace",fontSize:10,color:RB.muted,lineHeight:1.8}}>
        Sources: Q3 SMC Assessment Data (Grade 8 Math G7 Adv, ID 2526010906) · STAAR Grade 8 Frequency Distribution 2017–2025 (TEA/lead4ward v.6.23.25) · STAAR 2025–2026 Blueprint, Grade 8 Math (ESC Region IV) · DISD Calendar 2025–2026
      </div>
    </div>
  );
}

// ─── PASSWORD GATE ────────────────────────────────────────────────────────────
function PasswordGate({title,hint,validPasswords,onUnlock}){
  const [pw,setPw]=useState("");
  const [err,setErr]=useState(false);
  const check=()=>{
    const match=Object.entries(validPasswords).find(([,v])=>v===pw.trim().toUpperCase());
    if(match){onUnlock(match[0]);}
    else{setErr(true);setPw("");setTimeout(()=>setErr(false),2000);}
  };
  return(
    <div style={{minHeight:"60vh",display:"flex",alignItems:"center",justifyContent:"center",background:RB.bg}}>
      <div style={{background:RB.white,border:`3px solid ${RB.yellow}`,borderTop:`7px solid ${RB.yellow}`,
        padding:"32px 40px",textAlign:"center",boxShadow:pxShadow(),maxWidth:380,width:"100%"}}>
        <div style={{fontFamily:"monospace",fontSize:11,color:RB.yellow,letterSpacing:2,marginBottom:8}}>🔐 {title}</div>
        <div style={{fontFamily:"monospace",fontSize:13,color:RB.dark,marginBottom:16,lineHeight:1.6}}>{hint}</div>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&check()} placeholder="Password"
          style={{width:"100%",boxSizing:"border-box",padding:"10px 14px",fontSize:16,
            fontFamily:"monospace",border:`2px solid ${err?RB.red:RB.border}`,
            background:RB.white,color:RB.dark,letterSpacing:2,outline:"none",marginBottom:10}}/>
        {err&&<div style={{color:RB.red,fontFamily:"monospace",fontSize:11,marginBottom:10}}>✗ Incorrect password</div>}
        <PixelBtn onClick={check} bg={RB.yellow} fg={RB.dark} full>UNLOCK</PixelBtn>
      </div>
    </div>
  );
}
